name: Regenerate World Cup 2026 Calendar

on:
  schedule:
    # Every 2 hours — covers live score updates and new knockout team assignments
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate worldcup.ics
        run: python generate_ics.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worldcup.ics
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: regenerate worldcup.ics [skip ci]" &&
            git push
          )
